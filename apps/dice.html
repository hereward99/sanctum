<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Blood &amp; Dice — Vampire: the Masquerade</title>
<link rel="stylesheet" href="../shared/style.css">
<style>
  .controls-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin-bottom: 1.2rem;
  }
  .control-group label {
    display: block;
    font-family: 'Cinzel', serif;
    font-size: 0.58rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 0.5rem;
  }
  .control-group.hunger label { color: var(--hunger); }
  .control-group.hunger .stepper input { color: var(--hunger); }

  .btn-row { display: flex; gap: 0.6rem; }
  .btn-rouse {
    background: transparent;
    border: 1px solid rgba(231,76,60,0.4);
    border-radius: 3px;
    color: var(--hunger);
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    padding: 0.75rem 1rem;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-rouse:hover  { background: rgba(231,76,60,0.08); border-color: var(--hunger); }
  .btn-rouse:active { transform: scale(0.97); }

  .dice-section { margin-bottom: 0.8rem; }
  .dice-label {
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 0.5rem;
  }
  .dice-tray { display: flex; flex-wrap: wrap; gap: 8px; }

  .die {
    width: 40px; height: 40px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif;
    font-size: 1rem; font-weight: 700;
    border: 2px solid;
    position: relative;
    transition: transform 0.15s;
    animation: dieIn 0.2s ease both;
  }
  .die:hover { transform: translateY(-2px) scale(1.05); }
  @keyframes dieIn {
    from { transform: scale(0.5) rotate(-15deg); opacity: 0; }
    to   { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  .die-regular                { background: var(--panel-light); }
  .die-regular.val-10         { border-color: var(--gold);         color: var(--gold);    background: rgba(201,168,76,0.1); }
  .die-regular.success        { border-color: #27ae60;             color: #2ecc71;        background: rgba(46,204,113,0.08); }
  .die-regular.fail           { border-color: var(--border);       color: var(--text-dim); }
  .die-regular.val-1          { border-color: var(--border);       color: var(--text-dim); }
  .die-hunger                 { background: rgba(139,0,0,0.15); }
  .die-hunger.val-10          { border-color: #e67e22;             color: #e67e22;        background: rgba(230,126,34,0.12); }
  .die-hunger.success         { border-color: var(--hunger);       color: var(--hunger);  background: rgba(231,76,60,0.1); }
  .die-hunger.fail            { border-color: rgba(231,76,60,0.3); color: rgba(231,76,60,0.5); }
  .die-hunger.val-1           { border-color: var(--blood-light);  color: var(--blood-light); background: rgba(192,57,43,0.15); }
  .die-skull::after           { content: '☠'; font-size: 0.7rem; position: absolute; bottom: -2px; right: 0; opacity: 0.7; }

  .result-header  { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1rem; }
  .outcome-icon   { width: 44px; height: 44px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; margin-right: 0.75rem; flex-shrink: 0; }
  .outcome-text   { flex: 1; }
  .outcome-name   { font-family: 'Cinzel Decorative', serif; font-size: clamp(1rem,3.5vw,1.3rem); font-weight: 700; line-height: 1.2; }
  .outcome-desc   { font-size: 0.8rem; color: var(--ivory-dim); font-style: italic; margin-top: 0.2rem; line-height: 1.4; }
  .outcome-count  { text-align: right; }
  .count-big      { font-family: 'Cinzel', serif; font-size: 3rem; font-weight: 700; line-height: 1; }
  .count-vs       { font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 0.2em; color: var(--text-dim); text-transform: uppercase; }

  .oc-bestial-failure { --oc: var(--blood-light); }
  .oc-total-failure   { --oc: #c0392b; }
  .oc-failure         { --oc: var(--text-dim); }
  .oc-success         { --oc: #2ecc71; }
  .oc-messy-critical  { --oc: #e67e22; }
  .oc-critical        { --oc: var(--gold); }
  .outcome-name  { color: var(--oc); }
  .count-big     { color: var(--oc); }
  .outcome-icon  { border: 1px solid var(--oc); color: var(--oc); }

  .rouse-row     { display: flex; align-items: center; justify-content: space-between; padding: 0.9rem 1.2rem; }
  .rouse-info    { display: flex; align-items: center; gap: 0.75rem; }
  .rouse-title   { font-family: 'Cinzel', serif; font-size: 0.9rem; font-weight: 600; }
  .rouse-sub     { font-size: 0.75rem; color: var(--ivory-dim); font-style: italic; }
  .rouse-die     { width: 44px; height: 44px; border-radius: 6px; border: 2px solid; display: flex; align-items: center; justify-content: center; font-family: 'Cinzel', serif; font-size: 1.2rem; font-weight: 700; }
  .rouse-win     { border-color: #27ae60; color: #2ecc71; background: rgba(46,204,113,0.08); }
  .rouse-lose    { border-color: var(--blood-light); color: var(--hunger); background: rgba(192,57,43,0.1); }
  .rouse-win-card  { border-color: rgba(46,204,113,0.3) !important; }
  .rouse-lose-card { border-color: rgba(192,57,43,0.3) !important; }

  .history-row   { display: flex; align-items: center; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid rgba(58,40,48,0.5); }
  .history-row:last-child { border-bottom: none; }
  .history-outcome { font-family: 'Cinzel', serif; font-size: 0.7rem; font-weight: 600; }
  .history-meta  { font-size: 0.68rem; color: var(--text-dim); font-family: 'Cinzel', serif; }
</style>
</head>
<body>
<div class="page">

  <nav class="back-nav">
    <span class="back-nav-title">Blood &amp; Dice</span>
    <a class="back-btn" href="../index.html">← The Sanctum</a>
  </nav>

  <div class="card">
    <div class="card-title">⚄ Configure Your Roll</div>
    <div class="controls-grid">
      <div class="control-group">
        <label>Dice Pool</label>
        <div class="stepper">
          <button class="step-btn" onclick="adjust('pool',-1)">−</button>
          <input type="number" id="pool" min="1" max="30" value="5" oninput="clamp(this,1,30)">
          <button class="step-btn" onclick="adjust('pool',1)">+</button>
        </div>
      </div>
      <div class="control-group hunger">
        <label>🩸 Hunger</label>
        <div class="stepper">
          <button class="step-btn" onclick="adjust('hunger',-1)">−</button>
          <input type="number" id="hunger" min="0" max="5" value="1" oninput="clamp(this,0,5)">
          <button class="step-btn" onclick="adjust('hunger',1)">+</button>
        </div>
      </div>
      <div class="control-group">
        <label>Difficulty</label>
        <div class="stepper">
          <button class="step-btn" onclick="adjust('difficulty',-1)">−</button>
          <input type="number" id="difficulty" min="1" max="15" value="3" oninput="clamp(this,1,15)">
          <button class="step-btn" onclick="adjust('difficulty',1)">+</button>
        </div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="roll-btn" onclick="doRoll()" style="flex:1">⚄ Roll Dice</button>
      <button class="btn-rouse" onclick="doRouse()" title="Rouse Check">🩸</button>
      <button class="btn btn-secondary" id="reroll-btn" onclick="doRoll()" title="Re-roll" style="display:none;padding:0.75rem 1rem">↺</button>
    </div>
  </div>

  <div class="card animate-in" id="rouse-card" style="display:none; margin-top:1rem;">
    <div class="rouse-row" id="rouse-content"></div>
  </div>

  <div class="card animate-in" id="result-card" style="display:none; margin-top:1rem;">
    <div id="result-content"></div>
  </div>

  <div class="card" id="history-card" style="display:none; margin-top:1rem;">
    <div class="card-title">📜 Roll History</div>
    <div id="history-list"></div>
  </div>

</div>
<script>
function haptic(t) {
  if (!navigator.vibrate) return;
  if (t === 'roll') navigator.vibrate([10,30,20]);
  else navigator.vibrate(8);
}
function d10() { return Math.floor(Math.random()*10)+1; }

function rollV5(pool, hungerCount, difficulty) {
  const hunger = Math.min(hungerCount, pool);
  const dice = [];
  for (let i=0; i<pool-hunger; i++) dice.push({value:d10(), isHunger:false});
  for (let i=0; i<hunger; i++) dice.push({value:d10(), isHunger:true});
  const tens = dice.filter(d=>d.value===10);
  const regularSuccesses = dice.filter(d=>d.value>=6&&d.value<=9).length;
  const critPairs = Math.floor(tens.length/2);
  const totalSuccesses = regularSuccesses + tens.length + critPairs*2;
  const hasHungerTen = tens.some(d=>d.isHunger);
  const hasHungerOne = dice.some(d=>d.isHunger&&d.value===1);
  let outcome;
  if (totalSuccesses >= difficulty) {
    if (critPairs>0 && hasHungerTen) outcome='messy-critical';
    else if (critPairs>0) outcome='critical';
    else outcome='success';
  } else {
    if (hasHungerOne) outcome='bestial-failure';
    else if (totalSuccesses===0) outcome='total-failure';
    else outcome='failure';
  }
  return {dice, totalSuccesses, critPairs, margin:Math.max(0,totalSuccesses-difficulty), outcome, difficulty, poolSize:pool, hungerDice:hunger};
}

const OUTCOMES = {
  'bestial-failure': {label:'Bestial Failure', icon:'☠', desc:'The Beast rears its ugly head. You fail, and something terrible happens.'},
  'total-failure':   {label:'Total Failure',   icon:'✕', desc:'Complete failure. No successes at all.'},
  'failure':         {label:'Failure',          icon:'—', desc:"You didn't meet the difficulty threshold."},
  'success':         {label:'Success',          icon:'✦', desc:'You succeeded at your task.'},
  'messy-critical':  {label:'Messy Critical',   icon:'🩸', desc:'A stunning success — but the Beast leaves its mark.'},
  'critical':        {label:'Critical',         icon:'♛', desc:'An extraordinary success! Critical pairs grant bonus successes.'}
};

function dieClass(die) {
  const b = die.isHunger ? 'die-hunger' : 'die-regular';
  if (die.value===10) return b+' val-10';
  if (die.value>=6) return b+' success';
  if (die.value===1 && die.isHunger) return b+' val-1 die-skull';
  if (die.value===1) return b+' val-1';
  return b+' fail';
}

const history = [];

function adjust(id, delta) {
  haptic('tap');
  const el = document.getElementById(id);
  const limits = {pool:[1,30], hunger:[0,5], difficulty:[1,15]};
  const [min,max] = limits[id];
  el.value = Math.max(min, Math.min(max, parseInt(el.value||0)+delta));
}
function clamp(el, min, max) {
  const v = parseInt(el.value);
  if (!isNaN(v)) el.value = Math.max(min, Math.min(max, v));
}

function doRoll() {
  haptic('roll');
  const pool = parseInt(document.getElementById('pool').value)||5;
  const hunger = parseInt(document.getElementById('hunger').value)||0;
  const difficulty = parseInt(document.getElementById('difficulty').value)||3;
  const btn = document.getElementById('roll-btn');
  btn.disabled = true; btn.textContent = 'Rolling…';
  setTimeout(() => {
    const r = rollV5(pool, hunger, difficulty);
    history.unshift(r);
    if (history.length>20) history.pop();
    renderResult(r);
    renderHistory();
    btn.disabled = false;
    btn.innerHTML = '⚄ Roll Dice';
    document.getElementById('reroll-btn').style.display = '';
  }, 120);
}

function doRouse() {
  haptic('roll');
  const v = d10();
  const win = v >= 6;
  const card = document.getElementById('rouse-card');
  card.style.display = '';
  card.className = 'card animate-in ' + (win ? 'rouse-win-card' : 'rouse-lose-card');
  document.getElementById('rouse-content').innerHTML =
    '<div class="rouse-info"><span style="font-size:1.2rem">' + (win?'✦':'🩸') + '</span>' +
    '<div><div class="rouse-title">Rouse Check</div>' +
    '<div class="rouse-sub">' + (win?'Success — No Hunger increase':'Failure — Hunger rises by 1') + '</div></div></div>' +
    '<div class="rouse-die ' + (win?'rouse-win':'rouse-lose') + '">' + v + '</div>';
}

function renderResult(r) {
  const meta = OUTCOMES[r.outcome];
  const oc = r.outcome;
  const sorted = [...r.dice].sort((a,b) => {
    const rank = d => d.value===10?3:d.value>=6?2:1;
    return rank(b)-rank(a) || (a.isHunger?1:0)-(b.isHunger?1:0);
  });
  const diceHTML = sorted.map((d,i) =>
    '<div class="die '+dieClass(d)+'" style="animation-delay:'+i*40+'ms">'+(d.value===10?'10':d.value)+'</div>'
  ).join('');
  const regularCount = r.poolSize - r.hungerDice;
  const diceDesc = [
    regularCount>0 ? regularCount+' regular' : '',
    r.hungerDice>0 ? '<span style="color:var(--hunger)">'+r.hungerDice+' hunger</span>' : ''
  ].filter(Boolean).join(' + ');
  let badges = '<span class="badge badge-neutral">'+r.totalSuccesses+' success'+(r.totalSuccesses!==1?'es':'')+'</span>';
  if (r.critPairs>0) badges += '<span class="badge badge-gold">'+r.critPairs+' critical pair'+(r.critPairs>1?'s':'')+'</span>';
  if (r.margin>0) badges += '<span class="badge badge-green">+'+r.margin+' margin</span>';

  const card = document.getElementById('result-card');
  card.style.display = '';
  card.className = 'card animate-in';
  document.getElementById('result-content').innerHTML =
    '<div class="result-header oc-'+oc+'">' +
    '<div class="outcome-icon">'+meta.icon+'</div>' +
    '<div class="outcome-text"><div class="outcome-name">'+meta.label+'</div><div class="outcome-desc">'+meta.desc+'</div></div>' +
    '<div class="outcome-count oc-'+oc+'"><div class="count-big">'+r.totalSuccesses+'</div><div class="count-vs">vs '+r.difficulty+'</div></div>' +
    '</div><div class="divider"></div>' +
    '<div class="dice-section"><div class="dice-label">'+diceDesc+'</div><div class="dice-tray">'+diceHTML+'</div></div>' +
    '<div class="badges">'+badges+'</div>';
  void card.offsetWidth;
}

function renderHistory() {
  if (history.length < 2) return;
  document.getElementById('history-card').style.display = '';
  const colorMap = {'bestial-failure':'var(--blood-light)','total-failure':'#c0392b','failure':'var(--text-dim)','success':'#2ecc71','messy-critical':'#e67e22','critical':'var(--gold)'};
  document.getElementById('history-list').innerHTML = history.slice(1,8).map(r => {
    const meta = OUTCOMES[r.outcome];
    return '<div class="history-row"><span class="history-outcome" style="color:'+colorMap[r.outcome]+'">'+meta.icon+' '+meta.label+'</span><span class="history-meta">'+r.totalSuccesses+' vs '+r.difficulty+' · '+r.poolSize+'d ('+r.hungerDice+'h)</span></div>';
  }).join('');
}
</script>
</body>
</html>
