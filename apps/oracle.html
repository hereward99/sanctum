<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tour Oracle — Vampire: the Masquerade</title>
<link rel="stylesheet" href="../shared/style.css">
<style>
  /* Oracle uses Cormorant Garamond for its distinctive feel */
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Courier+Prime:ital@0;1&display=swap');

  .oracle-body { font-family: 'Cormorant Garamond', serif; }

  .section-label {
    font-family: 'Courier Prime', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, var(--gold-dim, #6b5425), transparent);
  }

  .oracle-section { margin-bottom: 44px; }

  .dice-group {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .dice-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--ivory-dim);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    font-weight: 300;
    letter-spacing: 0.1em;
    padding: 12px 8px;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .dice-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--blood);
    transform: scaleY(0);
    transform-origin: bottom;
    transition: transform 0.25s ease;
    z-index: 0;
  }
  .dice-btn span { position: relative; z-index: 1; }
  .dice-btn:hover { border-color: var(--blood-light); color: var(--ivory); }
  .dice-btn:hover::before { transform: scaleY(1); }
  .dice-btn.active { border-color: var(--blood-light); color: var(--ivory); background: var(--blood); }

  .mood-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }
  .mood-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--ivory-dim);
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.95rem;
    font-style: italic;
    padding: 10px 12px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: left;
    letter-spacing: 0.05em;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .mood-btn:hover { border-color: var(--gold); color: var(--ivory); }
  .mood-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(184,150,62,0.06); }

  .roll-area { text-align: center; margin: 44px 0; }
  .roll-btn {
    background: transparent;
    border: 1px solid var(--blood-light);
    color: var(--ivory);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 300;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    padding: 16px 48px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .roll-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--blood);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
    z-index: 0;
  }
  .roll-btn span { position: relative; z-index: 1; }
  .roll-btn:hover::before { transform: scaleX(1); }
  .roll-btn:active { transform: scale(0.98); }

  .output {
    min-height: 180px;
    border: 1px solid var(--border);
    padding: 28px 32px;
    position: relative;
  }
  .output::before {
    content: '';
    position: absolute;
    top: -1px; left: 32px;
    width: 48px; height: 1px;
    background: var(--shadow);
  }
  .output-empty {
    color: var(--ivory-dim);
    font-style: italic;
    font-size: 1rem;
    line-height: 1.7;
    font-family: 'Cormorant Garamond', serif;
  }

  .result-dice {
    font-family: 'Courier Prime', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 16px;
    opacity: 0.7;
  }
  .result-answer {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.25rem;
    font-weight: 400;
    color: var(--ivory);
    line-height: 1.5;
    margin-bottom: 12px;
  }
  .result-answer.yes     { color: #c9d4b5; }
  .result-answer.yes-and { color: #d4c9b5; }
  .result-answer.yes-but { color: var(--ivory); }
  .result-answer.no-but  { color: #b5c0c9; }
  .result-answer.no      { color: #c9b5b5; }
  .result-answer.no-and  { color: var(--blood-light); }

  .result-detail {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.95rem;
    font-style: italic;
    color: var(--ivory-dim);
    line-height: 1.65;
    border-left: 2px solid var(--border);
    padding-left: 16px;
    margin-bottom: 16px;
  }
  .result-complication {
    font-family: 'Courier Prime', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    color: var(--blood-light);
    text-transform: uppercase;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }
  .result-complication::before { content: 'COMPLICATION: '; }

  hr.oracle-divider { border: none; border-top: 1px solid var(--border); margin: 44px 0; }

  .hint {
    font-family: 'Courier Prime', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-transform: uppercase;
    text-align: center;
    margin-top: -32px;
    margin-bottom: 44px;
  }

  .pool-list { list-style: none; display: flex; flex-direction: column; }
  .pool-item {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(58,40,48,0.5);
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.95rem;
    color: var(--ivory-dim);
    cursor: pointer;
    transition: color 0.2s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .pool-item:last-child { border-bottom: none; }
  .pool-item:hover { color: var(--ivory); }
  .pool-item.resolved { text-decoration: line-through; color: var(--border); }
  .pool-num {
    font-family: 'Courier Prime', monospace;
    font-size: 0.6rem;
    color: var(--gold);
    opacity: 0.6;
    min-width: 24px;
  }

  .pool-add { display: flex; gap: 8px; margin-top: 12px; }
  .pool-input {
    flex: 1;
    background: transparent;
    border: 1px solid var(--border);
    border-right: none;
    color: var(--ivory);
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.95rem;
    font-style: italic;
    padding: 8px 14px;
    outline: none;
  }
  .pool-input::placeholder { color: var(--border); }
  .pool-input:focus { border-color: var(--gold); }
  .pool-add-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--ivory-dim);
    font-family: 'Courier Prime', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    padding: 8px 16px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .pool-add-btn:hover { border-color: var(--gold); color: var(--gold); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .oracle-animate { animation: fadeUp 0.35s ease forwards; }
</style>
</head>
<body>
<div class="page oracle-body">

  <nav class="back-nav">
    <span class="back-nav-title">Tour Oracle</span>
    <a class="back-btn" href="../index.html">← The Sanctum</a>
  </nav>

  <!-- Tier -->
  <div class="card" style="margin-bottom:1rem">
    <div class="section-label">I. Question Tier</div>
    <div class="dice-group">
      <button class="dice-btn active" onclick="setTier(1,this)"><span>• Current Events</span></button>
      <button class="dice-btn" onclick="setTier(2,this)"><span>•• Residents &amp; Groups</span></button>
      <button class="dice-btn" onclick="setTier(3,this)"><span>••• Secrets &amp; Lies</span></button>
    </div>
  </div>

  <!-- Mood -->
  <div class="card" style="margin-bottom:1rem">
    <div class="section-label">II. Site Mood (optional)</div>
    <div class="mood-grid">
      <button class="mood-btn" onclick="setMood('tense',this)">Tense</button>
      <button class="mood-btn" onclick="setMood('celebratory',this)">Celebratory</button>
      <button class="mood-btn" onclick="setMood('deserted',this)">Deserted</button>
      <button class="mood-btn" onclick="setMood('chaotic',this)">Chaotic</button>
      <button class="mood-btn" onclick="setMood('mournful',this)">Mournful</button>
      <button class="mood-btn" onclick="setMood('conspiratorial',this)">Conspiratorial</button>
      <button class="mood-btn" onclick="setMood('predatory',this)">Predatory</button>
      <button class="mood-btn" onclick="setMood('oblivious',this)">Oblivious</button>
    </div>
  </div>

  <!-- Roll -->
  <div class="roll-area">
    <button class="roll-btn" onclick="rollOracle()"><span>Consult the Dark</span></button>
  </div>

  <p class="hint">Tap a complication to mark it resolved</p>

  <!-- Answer -->
  <div class="card" style="margin-bottom:1rem">
    <div class="section-label">III. The Answer</div>
    <div class="output" id="oracle-output">
      <p class="output-empty">The night has not yet spoken. Set your question tier and consult the oracle above.</p>
    </div>
  </div>

  <hr class="oracle-divider">

  <!-- Complications pool -->
  <div class="card">
    <div class="section-label">IV. Simmering Complications</div>
    <ul class="pool-list" id="pool-list"></ul>
    <div class="pool-add">
      <input class="pool-input" id="pool-input" type="text" placeholder="Note a complication, NPC, or hook…">
      <button class="pool-add-btn" onclick="addComplication()">Add</button>
    </div>
  </div>

</div>
<script>
let tier = 1;
let mood = null;
let complications = [];
let complicationsData = null;

function haptic(t) {
  if (!navigator.vibrate) return;
  if (t === 'roll') navigator.vibrate([10,30,20]);
  else navigator.vibrate(8);
}

// Load complications from JSON
fetch('../data/oracle-complications.json')
  .then(r => r.json())
  .then(data => { complicationsData = data; })
  .catch(() => { complicationsData = {}; });

// Oracle answer table — index 0 = roll of 2, index 18 = roll of 20
const ANSWERS = [
  {label:'No, and\u2014', cls:'no-and', details:["Not only does the scene deny you what you sought, it closes a door. Something\u2014or someone\u2014has made it harder to return.","The site turns actively hostile. A presence here has taken notice of your interest and does not welcome it.","The question has no answer here. The trail is cold. And someone is watching you leave."]},
  {label:'No, and\u2014', cls:'no-and', details:["The city conspires against you tonight. Leave before the situation worsens.","An ally at this site has become unreliable. Someone got to them first.","Whatever you came for has been removed, destroyed, or silenced."]},
  {label:'No, and\u2014', cls:'no-and', details:["The scene sours completely. You leave with less than you came with.","A door closes. Note who closed it\u2014they will be a problem.","Hostile eyes follow you out. This site is compromised for now."]},
  {label:'No.', cls:'no', details:["The answer you sought isn't here. The site offers nothing on this tonight.","Closed doors. Averted eyes. Whatever you came looking for, you find only absence.","The site is unreadable tonight. Pursue this question at another time."]},
  {label:'No.', cls:'no', details:["Nothing useful surfaces. The people here don't know, or won't say.","A dead end. The answer lies elsewhere\u2014or deeper.","The site keeps its counsel. You leave with nothing confirmed."]},
  {label:'No.', cls:'no', details:["Silence. The question hangs unanswered. Try a different approach.","No one here can help you, or no one will. The distinction barely matters.","The trail ends here. Another site may hold what you need."]},
  {label:'No, but\u2014', cls:'no-but', details:["You don't get an answer, but you pick up a thread. Follow it somewhere else.","The scene denies you, but leaves a crack. A name, a gesture, a door slightly ajar.","Not tonight. But someone here knows something, and they've noticed you're asking."]},
  {label:'No, but\u2014', cls:'no-but', details:["The answer eludes you, but the question itself has stirred something. Check back.","Failure yields a consolation: a Resident reveals a tangential truth worth noting.","You don't find what you came for, but you find something you weren't expecting."]},
  {label:'No, but\u2014', cls:'no-but', details:["Not here, not tonight\u2014but a lead surfaces. It points somewhere useful.","The question goes unanswered, but a contact is made. That may matter more.","Empty-handed, but not empty-headed. Note what you learned about the site itself."]},
  {label:'Yes, but\u2014', cls:'yes-but', details:["The answer comes, but at a cost. A complication surfaces alongside the information.","You get what you need, though not cleanly. Someone else is also now aware of your interest.","The question is answered\u2014imperfectly. The truth is partial, or the price is unclear."]},
  {label:'Yes, but\u2014', cls:'yes-but', details:["Progress, but with friction. The answer is here; so is a problem you didn't anticipate.","A Resident gives you what you need and asks for something in return\u2014or will, later.","Yes, with a shadow attached. Note the complication before moving on."]},
  {label:'Yes, but\u2014', cls:'yes-but', details:["The information is yours, but the cost isn't clear yet. It will become clear.","Answered\u2014with strings. A favour owed, a secret shared, a witness you didn't want.","You find what you came for, and something finds you in return."]},
  {label:'Yes.', cls:'yes', details:["The site yields. The answer to your question is clear and unambiguous.","Clean information. A Resident confirms what you needed to know.","The Tour delivers. Note the answer and one detail about who else was present."]},
  {label:'Yes.', cls:'yes', details:["The question is answered fully. The vignette can close.","Unambiguous. The scene has given you what you came for.","The site is open to you tonight. Take your answer and go."]},
  {label:'Yes.', cls:'yes', details:["A straightforward success. The city has nothing to hide from you tonight.","The answer surfaces easily. Note it and move on.","What you sought was here all along. Uncomplicated. Enjoy the rarity."]},
  {label:'Yes, and\u2014', cls:'yes-and', details:["Better than expected. The answer arrives with a bonus\u2014an extra detail, a useful contact, an unexpected advantage.","The scene exceeds the question. Note one additional thing you learned that you weren't looking for.","A gift from the city. Your question is answered, and something unexpected falls into your lap."]},
  {label:'Yes, and\u2014', cls:'yes-and', details:["Exceptional. The answer and something more\u2014a new alliance, a revealed secret, a dramatic turn.","The site gives you everything tonight. Mark a new NPC as friendly or a Resident as an asset.","More than you hoped for. The answer is clear, and the scene has opened a new possibility."]},
  {label:'Yes, and\u2014', cls:'yes-and', details:["The city opens up. Not only is your question answered, a door you didn't know existed swings wide.","Windfall. Take the answer and an unexpected advantage\u2014use it before it expires.","Fortune favours you entirely tonight. Note the answer and one new asset at this site."]},
  {label:'Yes, and\u2014', cls:'yes-and', details:["Everything you came for, and more. The night has decided to be generous. Don't question it.","The scene delivers beyond all expectation. Mark this site as particularly fruitful.","A rare and complete success. The answer, an advantage, and a moment to savour."]}
];

function rand(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

function setTier(t, el) {
  haptic('tap');
  tier = t;
  document.querySelectorAll('.dice-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function setMood(m, el) {
  haptic('tap');
  if (mood === m) {
    mood = null;
    el.classList.remove('active');
  } else {
    mood = m;
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
  }
}

function rollOracle() {
  haptic('roll');
  const d1 = Math.ceil(Math.random()*10);
  const d2 = Math.ceil(Math.random()*10);
  let roll = Math.max(2, Math.min(20, d1+d2-(tier-1)));

  const answer = ANSWERS[roll-2];
  const detail = rand(answer.details);

  const forceComplication = roll <= 7 || (roll <= 10 && tier === 3);
  let complicationText = null;

  if (forceComplication && complicationsData) {
    const pool = (mood && complicationsData[mood]) ? complicationsData[mood] : complicationsData.generic || [];
    if (pool.length) complicationText = rand(pool);
  }

  const rollLabel = 'd10+d10 \u2192 ' + d1 + '+' + d2 + (tier>1 ? ' | tier -'+(tier-1)+' \u2192 roll '+roll : ' | roll '+roll);

  let html = '<div class="oracle-animate">';
  html += '<div class="result-dice">' + rollLabel + '</div>';
  html += '<div class="result-answer ' + answer.cls + '">' + answer.label + '</div>';
  html += '<div class="result-detail">' + detail + '</div>';
  if (complicationText) {
    html += '<div class="result-complication">' + complicationText + '</div>';
    complications.push({text: complicationText, resolved: false});
    renderPool();
  }
  html += '</div>';

  document.getElementById('oracle-output').innerHTML = html;
}

function addComplication() {
  haptic('tap');
  const input = document.getElementById('pool-input');
  const val = input.value.trim();
  if (!val) return;
  complications.push({text: val, resolved: false});
  input.value = '';
  renderPool();
}

document.getElementById('pool-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') addComplication();
});

function renderPool() {
  const list = document.getElementById('pool-list');
  if (complications.length === 0) {
    list.innerHTML = '<li style="font-style:italic;color:var(--text-dim);font-size:0.9rem;padding:10px 0;font-family:\'Cormorant Garamond\',serif">No complications noted yet.</li>';
    return;
  }
  list.innerHTML = '';
  complications.forEach(function(c, i) {
    const li = document.createElement('li');
    li.className = 'pool-item' + (c.resolved ? ' resolved' : '');
    li.innerHTML = '<span class="pool-num">' + String(i+1).padStart(2,'0') + '</span>' + c.text;
    li.addEventListener('click', function() {
      haptic('tap');
      complications[i].resolved = !complications[i].resolved;
      renderPool();
    });
    list.appendChild(li);
  });
}

renderPool();
</script>
</body>
</html>
