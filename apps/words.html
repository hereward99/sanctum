<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Word Oracle — Vampire: the Masquerade</title>
<link rel="stylesheet" href="../shared/style.css">
<style>
  .count-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1.2rem;
  }
  .count-label {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-dim);
    flex-shrink: 0;
  }

  .master-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.2rem;
  }
  .master-btn {
    flex: 1;
    padding: 8px 4px;
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .master-btn:hover  { border-color: var(--gold); color: var(--gold); }
  .master-btn:active { transform: scale(0.96); }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.8rem;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    padding: 2px 0;
  }
  .section-name {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .section-arrow {
    font-size: 0.6rem;
    color: var(--text-dim);
    transition: transform 0.2s;
  }
  .section-arrow.open { transform: rotate(180deg); }

  .section-mini-btns { display: flex; gap: 5px; }
  .mini-btn {
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 8px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .mini-btn:hover  { border-color: var(--gold); color: var(--gold); }
  .mini-btn:active { transform: scale(0.95); }

  .checkbox-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
    overflow: hidden;
    transition: max-height 0.25s ease, opacity 0.2s;
    max-height: 600px;
    opacity: 1;
    margin-bottom: 0.4rem;
  }
  .checkbox-group.collapsed { max-height: 0; opacity: 0; }

  .checkbox-label {
    display: flex;
    align-items: center;
    cursor: pointer;
    padding: 8px 10px;
    border: 1px solid transparent;
    border-radius: 3px;
    transition: background 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .checkbox-label:hover { background: rgba(139,0,0,0.08); border-color: rgba(139,0,0,0.2); }
  .checkbox-label input[type="checkbox"] {
    margin-right: 10px;
    width: 16px; height: 16px;
    cursor: pointer;
    accent-color: var(--blood-light);
    flex-shrink: 0;
  }
  .checkbox-label span {
    font-family: 'IM Fell English', serif;
    color: var(--ivory-dim);
    font-size: 0.9rem;
    text-transform: capitalize;
  }
  .checkbox-label:has(input:checked) span { color: var(--ivory); }

  .word-tags { display: flex; flex-wrap: wrap; gap: 8px; }
  .word-tag {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    color: var(--gold);
    border: 1px solid rgba(201,168,76,0.35);
    background: rgba(201,168,76,0.06);
    padding: 6px 14px;
    border-radius: 20px;
    animation: tagIn 0.2s ease both;
  }
  @keyframes tagIn {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: scale(1); }
  }

  .copy-text {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-top: 0.8rem;
    padding: 0.6rem 0.8rem;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--panel-light);
    word-break: break-word;
    line-height: 1.5;
  }
  .btn-copy {
    width: 100%;
    background: var(--panel-light);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--ivory-dim);
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    padding: 0.65rem;
    margin-top: 0.6rem;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .btn-copy:hover  { border-color: var(--gold); color: var(--gold); }
  .btn-copy.copied { border-color: var(--green-dim); color: var(--green); }
</style>
</head>
<body>
<div class="page">

  <nav class="back-nav">
    <span class="back-nav-title">Word Oracle</span>
    <a class="back-btn" href="../index.html">← The Sanctum</a>
  </nav>

  <div class="card">
    <div class="card-title">⚄ Configuration</div>
    <div class="loading" id="loading-msg">Gathering the lexicon…</div>

    <div id="app-content" style="display:none">
      <div class="count-row">
        <span class="count-label">Words</span>
        <div class="stepper">
          <button class="step-btn" onclick="adjust(-1)">−</button>
          <input type="number" id="wordCount" min="1" max="10" value="5">
          <button class="step-btn" onclick="adjust(1)">+</button>
        </div>
      </div>

      <div class="master-row">
        <button class="master-btn" onclick="masterSelect(true)">✦ Select All</button>
        <button class="master-btn" onclick="masterSelect(false)">✕ Unselect All</button>
      </div>

      <div id="sections-container"></div>

      <button class="btn btn-primary" onclick="generate()" style="margin-top:1.2rem">⚡ Generate Words</button>
    </div>
  </div>

  <div class="card animate-in" id="results-card" style="display:none; margin-top:1rem;">
    <div class="card-title">✦ Generated Words</div>
    <div id="word-output"></div>
    <div id="copy-block" style="display:none">
      <div class="copy-text" id="copy-text"></div>
      <button class="btn-copy" id="copy-btn" onclick="copyWords()">📋 Copy to Clipboard</button>
    </div>
  </div>

</div>
<script>
// Section configuration: key in JSON file → display label, icon, default checked categories
const SECTIONS = [
  { file: 'words-grammatical.json', key: 'grammatical',          label: 'Grammatical',          icon: '⚔', defaults: ['nouns','verbs','adjectives'] },
  { file: 'words-academic.json',    key: 'academic and cultural', label: 'Academic & Cultural',  icon: '📜', defaults: ['general'] },
  { file: 'words-genre.json',       key: 'genre',                 label: 'Genre',                icon: '🩸', defaults: [] },
  { file: 'words-resonance.json',   key: 'resonance',             label: 'Resonance',            icon: '♛', defaults: [] },
];

const RESONANCE_LABELS = {
  sanguine:   'Sanguine (air)',
  phlegmatic: 'Phlegmatic (water)',
  choleric:   'Choleric (fire)',
  melancholy: 'Melancholy (earth)',
};

let wordLists  = {};
let lastWords  = [];
let sectionsLoaded = 0;

function haptic(t) {
  if (!navigator.vibrate) return;
  if (t === 'generate') navigator.vibrate([10,30,20]);
  else if (t === 'copy') navigator.vibrate([15,20,15]);
  else navigator.vibrate(t === 'check' ? 6 : 8);
}

// Load all section JSON files in parallel
Promise.all(
  SECTIONS.map(s =>
    fetch('../data/' + s.file)
      .then(r => r.json())
      .then(data => { wordLists[s.key] = data; })
  )
).then(() => {
  document.getElementById('loading-msg').style.display = 'none';
  document.getElementById('app-content').style.display = '';
  buildUI();
}).catch(() => {
  document.getElementById('loading-msg').textContent = 'Failed to load word lists. Please refresh.';
});

function buildUI() {
  const container = document.getElementById('sections-container');
  SECTIONS.forEach((section, idx) => {
    const data = wordLists[section.key];
    const categories = Object.keys(data);
    const sectionKey = section.key;
    const groupId = 'group-' + idx;
    const arrowId = 'arrow-' + idx;

    const wrapper = document.createElement('div');

    // Section header
    const header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML =
      '<span class="section-name">' + section.icon + ' ' + section.label + '</span>' +
      '<div style="display:flex;align-items:center;gap:8px">' +
      '<div class="section-mini-btns" onclick="event.stopPropagation()">' +
      '<button class="mini-btn" onclick="sectionSelect(' + idx + ',true)">All</button>' +
      '<button class="mini-btn" onclick="sectionSelect(' + idx + ',false)">None</button>' +
      '</div>' +
      '<span class="section-arrow open" id="' + arrowId + '">▼</span>' +
      '</div>';
    header.addEventListener('click', () => toggleSection(idx));
    wrapper.appendChild(header);

    // Checkbox group
    const group = document.createElement('div');
    group.className = 'checkbox-group';
    group.id = groupId;

    categories.forEach(cat => {
      const label = document.createElement('label');
      label.className = 'checkbox-label';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.dataset.section = sectionKey;
      cb.dataset.category = cat;
      cb.checked = section.defaults.includes(cat);
      cb.addEventListener('change', () => haptic('check'));
      const span = document.createElement('span');
      span.textContent = RESONANCE_LABELS[cat] || cat;
      label.appendChild(cb);
      label.appendChild(span);
      group.appendChild(label);
    });
    wrapper.appendChild(group);

    // Divider (not after last section)
    if (idx < SECTIONS.length - 1) {
      const div = document.createElement('div');
      div.className = 'divider';
      div.style.margin = '1rem 0';
      wrapper.appendChild(div);
    }

    container.appendChild(wrapper);
  });
}

function toggleSection(idx) {
  haptic('toggle');
  document.getElementById('group-' + idx).classList.toggle('collapsed');
  document.getElementById('arrow-' + idx).classList.toggle('open');
}

function sectionSelect(idx, val) {
  haptic('toggle');
  const sectionKey = SECTIONS[idx].key;
  document.querySelectorAll('input[data-section="' + sectionKey + '"]')
    .forEach(cb => cb.checked = val);
}

function masterSelect(val) {
  haptic('toggle');
  document.querySelectorAll('input[type="checkbox"][data-section]')
    .forEach(cb => cb.checked = val);
}

function adjust(delta) {
  haptic('check');
  const el = document.getElementById('wordCount');
  el.value = Math.max(1, Math.min(10, parseInt(el.value||5) + delta));
}

function generate() {
  haptic('generate');
  const count = parseInt(document.getElementById('wordCount').value) || 5;
  const checked = document.querySelectorAll('input[type="checkbox"]:checked');

  const resultsCard = document.getElementById('results-card');
  resultsCard.style.display = '';

  if (checked.length === 0) {
    document.getElementById('word-output').innerHTML = '<div class="loading">Please select at least one category.</div>';
    document.getElementById('copy-block').style.display = 'none';
    return;
  }

  const pool = [];
  checked.forEach(cb => {
    const sectionData = wordLists[cb.dataset.section];
    if (sectionData && sectionData[cb.dataset.category]) {
      pool.push(...sectionData[cb.dataset.category]);
    }
  });

  const unique = [...new Set(pool)].sort(() => Math.random() - 0.5);
  lastWords = unique.slice(0, Math.min(count, unique.length));

  document.getElementById('word-output').innerHTML =
    '<div class="word-tags">' +
    lastWords.map((w,i) => '<span class="word-tag" style="animation-delay:'+i*35+'ms">'+w+'</span>').join('') +
    '</div>';

  document.getElementById('copy-text').textContent = lastWords.join(', ');
  document.getElementById('copy-block').style.display = '';
  const copyBtn = document.getElementById('copy-btn');
  copyBtn.textContent = '📋 Copy to Clipboard';
  copyBtn.classList.remove('copied');

  resultsCard.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function copyWords() {
  haptic('copy');
  navigator.clipboard.writeText(lastWords.join(', ')).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ Copied to Clipboard';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '📋 Copy to Clipboard';
      btn.classList.remove('copied');
    }, 2000);
  });
}
</script>
</body>
</html>
